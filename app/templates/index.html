<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Trợ lý ảo tư vấn luật hiện hành tại Việt Nam</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

</head>
<body>

<header class="top-bar">
  <div class="logo">
    <img src="/static/images/logo_HCC.png" alt="Logo">
    <span>TRỢ LÝ ẢO TƯ VẤN LUẬT HIỆN HÀNH TẠI VIỆT NAM</span>
  </div>
</header>

<main class="container">

  <h1 class="intro">
    Xin chào! Tôi là trợ lý ảo hỗ trợ tra cứu và tư vấn về các văn bản luật. 
    Tôi có thể giúp gì cho bạn?
  </h1>

  <!-- CHAT BOX -->
  <div id="chat-box" class="chat-box"></div>

  <!-- INPUT -->
  <div class="input-box">
    <input
      id="question"
      placeholder="Nhập câu hỏi pháp luật tại đây..."
      autocomplete="off"
      onkeydown="if(event.key==='Enter') send()"
    />
    <button class="send-btn" onclick="send()">
      <i class="fa-solid fa-arrow-up"></i>
    </button>
  </div>
  

  <div class="footer">
    Email: thaibao203.1987@gmail.com &nbsp;&nbsp;
    Hotline: <b>0909090909</b>
  </div>

</main>

<!-- POPUP HIỂN THỊ DẪN CHỨNG PHÁP LUẬT -->
<div id="citation-popup" class="popup hidden">
  <div class="popup-content">
    <div class="popup-header">
      <span>Dẫn chứng pháp luật</span>
      <button onclick="closePopup()">✕</button>
    </div>
    <div id="popup-body"></div>
  </div>
</div>


<script src="/static/js/chat.js"></script>

</body>
</html>
